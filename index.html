<!DOCTYPE html>
<html style="background:transparent;overflow:hidden">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 5px; font-family: "Arial Black", sans-serif; color: #0abab5; line-height: 1.1; }
        #logo { height: 35px; margin-bottom: 4px; display: block; }
        /* 修正描邊：使用兩層文字疊加效果，確保顏色不被吃掉 */
        .outline {
            position: relative;
            display: inline-block;
            -webkit-text-stroke: 4px white; /* 稍微加粗邊線 */
            paint-order: stroke fill;
        }
        #date { font-size: 14px; }
        #clock { font-size: 20px; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <img id="logo" src="my_logo.png">
    <div id="date" class="outline"></div><br>
    <div id="clock" class="outline"></div>

    <script>
        const pad = n => String(n).padStart(2, '0');
        const days = ['Sun.', 'Mon.', 'Tue.', 'Wed.', 'Thu.', 'Fri.', 'Sat.'];
        setInterval(() => {
            const d = new Date();
            document.getElementById('date').innerText = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${days[d.getDay()]}`;
            document.getElementById('clock').innerText = d.toLocaleTimeString('zh-TW', {hour12:false});
        }, 1000);
    </script>
</body>
</html>
