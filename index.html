<!DOCTYPE html>
<html style="background:transparent;overflow:hidden">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 5px; font-family: sans-serif; color: #0abab5; font-weight: 900; -webkit-text-stroke: 1px white; line-height: 1.1; }
        #logo { height: 35px; margin-bottom: 4px; display: block; }
        #date { font-size: 13px; }
        #clock { font-size: 19px; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <img id="logo" src="my_logo.png">
    <div id="date"></div>
    <div id="clock"></div>

    <script>
        const pad = n => String(n).padStart(2, '0');
        const days = ['Sun.', 'Mon.', 'Tue.', 'Wed.', 'Thu.', 'Fri.', 'Sat.'];
        setInterval(() => {
            const d = new Date();
            const dateStr = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${days[d.getDay()]}`;
            document.getElementById('date').innerText = dateStr;
            document.getElementById('clock').innerText = d.toLocaleTimeString('zh-TW', {hour12:false});
        }, 1000);
    </script>
</body>
</html>
