<!DOCTYPE html>
<html style="background:transparent;overflow:hidden">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0;           /* 移除網頁邊距 */
            padding: 0;          /* 移除內容內縮 */
            /* 優先使用雲端胖字體 'Black Han Sans' */
            font-family: 'Black Han Sans', Impact, "Arial Black", sans-serif; 
            color: #008b8b;      /* 您目前設定的深藍綠色 */
            line-height: 1.0;    /* 壓縮行高，讓文字更緊湊 */
            
            /* 置中關鍵設定：使用 Flex 佈局讓內容垂直排列並水平置中 */
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
        }
        
        #logo { 
            height: 70px;        /* 您目前設定的 Logo 高度 */
            width: auto;         /* 寬度依比例縮放 */
            margin-bottom: 2px;  /* 圖片下方的間距 */
            display: block;      /* 讓圖片獨立占據一行 */
        }
        
        .text-style {
            /* 白色描邊：4px 寬度，確保在深色背景下文字清晰 */
            -webkit-text-stroke: 4px white; 
            /* 關鍵：先畫描邊再填充顏色，防止字體被邊框吃掉變細 */
            paint-order: stroke fill; 
            display: block;      /* 確保每一行文字自動換行 */
            margin-top: 0px;     /* 文字與上方的間距 */
            width: fit-content;  /* 寬度根據內容自動調整，有利於置中 */
        }
        
        #date { font-size: 20px; }  /* 您目前設定的日期大小 */
        #clock { font-size: 30px; font-variant-numeric: tabular-nums; } /* 您目前設定的時間大小 */
    </style>
</head>
<body>
    <img id="logo" src="my_logo.png">
    
    <div id="date" class="text-style"></div>
    
    <div id="clock" class="text-style"></div>

    <script>
        // 數字補零工具函數
        const pad = n => String(n).padStart(2, '0');
        
        // 定義星期幾的英文縮寫陣列
        const days = ['Sun.', 'Mon.', 'Tue.', 'Wed.', 'Thu.', 'Fri.', 'Sat.'];
        
        // 設定每 1秒 更新一次畫面
        setInterval(() => {
            const d = new Date(); // 取得系統時間
            
            // 組合日期格式：2026/03/09 Mon.
            const dateStr = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${days[d.getDay()]}`;
            document.getElementById('date').innerText = dateStr;
            
            // 取得 24 小時制的即時時間
            document.getElementById('clock').innerText = d.toLocaleTimeString('zh-TW', {hour12:false});
        }, 1000);
    </script>
</body>
</html>
